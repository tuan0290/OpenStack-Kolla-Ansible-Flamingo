---
# prepare-nodes.yml
# Tự động hóa toàn bộ bước chuẩn bị môi trường trong 01-environment-prepare.md
#
# Chạy từ trong container:
#   ansible-playbook -i inventory/all-nodes playbooks/prepare-nodes.yml
#
# Chạy từng tag riêng lẻ:
#   ansible-playbook -i inventory/all-nodes playbooks/prepare-nodes.yml --tags hostname
#   ansible-playbook -i inventory/all-nodes playbooks/prepare-nodes.yml --tags docker
#   ansible-playbook -i inventory/all-nodes playbooks/prepare-nodes.yml --tags ntp

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 1: Cấu hình chung cho tất cả nodes
# ─────────────────────────────────────────────────────────────────────────────
- name: Common setup for all nodes
  hosts: all_nodes
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [common, packages]

    - name: Upgrade all packages
      apt:
        upgrade: dist
      tags: [common, packages]

    - name: Install common packages
      apt:
        name:
          - python3-pip
          - python3-venv
          - git
          - curl
          - wget
          - vim
          - net-tools
          - ca-certificates
          - gnupg
          - lsb-release
        state: present
      tags: [common, packages]

    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"
      tags: [common, hostname]

    - name: Update /etc/hosts
      blockinfile:
        path: /etc/hosts
        block: |
          192.168.225.195    controller
          192.168.225.196    compute1
          192.168.225.197    storage1
          192.168.225.198    object1
          192.168.225.199    object2
        marker: "# {mark} ANSIBLE MANAGED - OpenStack nodes"
      tags: [common, hostname]

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 2: Cài đặt Docker trên tất cả nodes
# ─────────────────────────────────────────────────────────────────────────────
- name: Install Docker on all nodes
  hosts: all_nodes
  become: true

  tasks:
    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      tags: docker

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
      tags: docker

    - name: Add Docker apt repository
      apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker
      tags: docker

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present
        update_cache: yes
      tags: docker

    - name: Configure Docker daemon with insecure registry
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["192.168.182.128:4000"],
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "50m",
              "max-file": "5"
            }
          }
      tags: docker

    - name: Start and enable Docker
      systemd:
        name: docker
        state: restarted
        enabled: yes
      tags: docker

    - name: Verify Docker is running
      command: docker --version
      register: docker_version
      changed_when: false
      tags: docker

    - name: Show Docker version
      debug:
        msg: "{{ inventory_hostname }}: {{ docker_version.stdout }}"
      tags: docker

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 3: Cấu hình NTP - Controller làm NTP server
# ─────────────────────────────────────────────────────────────────────────────
- name: Configure NTP server on controller
  hosts: ntp_server
  become: true

  tasks:
    - name: Install chrony
      apt:
        name: chrony
        state: present
      tags: ntp

    - name: Configure chrony as NTP server
      copy:
        dest: /etc/chrony/chrony.conf
        content: |
          server 1.vn.pool.ntp.org iburst
          server 0.asia.pool.ntp.org iburst
          server 3.asia.pool.ntp.org iburst
          allow 192.168.225.0/24
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
          logdir /var/log/chrony
      tags: ntp

    - name: Restart and enable chrony
      systemd:
        name: chrony
        state: restarted
        enabled: yes
      tags: ntp

- name: Configure NTP clients
  hosts: ntp_clients
  become: true

  tasks:
    - name: Install chrony
      apt:
        name: chrony
        state: present
      tags: ntp

    - name: Configure chrony as NTP client (sync from controller)
      copy:
        dest: /etc/chrony/chrony.conf
        content: |
          server 192.168.225.195 iburst
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
          logdir /var/log/chrony
      tags: ntp

    - name: Restart and enable chrony
      systemd:
        name: chrony
        state: restarted
        enabled: yes
      tags: ntp

    - name: Wait for NTP sync
      command: chronyc tracking
      register: ntp_status
      retries: 5
      delay: 5
      until: "'Not synchronised' not in ntp_status.stdout"
      changed_when: false
      tags: ntp

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 4: Cấu hình network - Controller
# ─────────────────────────────────────────────────────────────────────────────
- name: Configure network on controller
  hosts: controller
  become: true

  tasks:
    - name: Configure netplan for controller
      copy:
        dest: /etc/netplan/50-cloud-init.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            ethernets:
              ens33:
                addresses:
                  - 192.168.182.195/24
                routes:
                  - to: default
                    via: 192.168.182.2
                nameservers:
                  addresses: [8.8.8.8]
              ens37:
                addresses:
                  - 192.168.225.195/24
              ens38:
                addresses:
                  - 192.168.147.195/24
      tags: network

    - name: Apply netplan
      command: netplan apply
      tags: network

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 5: Cấu hình network - Compute1
# ─────────────────────────────────────────────────────────────────────────────
- name: Configure network on compute1
  hosts: compute1
  become: true

  tasks:
    - name: Configure netplan for compute1
      copy:
        dest: /etc/netplan/50-cloud-init.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            ethernets:
              ens33:
                addresses:
                  - 192.168.182.196/24
                routes:
                  - to: default
                    via: 192.168.182.2
                nameservers:
                  addresses: [8.8.8.8]
              ens37:
                addresses:
                  - 192.168.225.196/24
              ens38:
                addresses:
                  - 192.168.147.196/24
      tags: network

    - name: Apply netplan
      command: netplan apply
      tags: network

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 6: Cấu hình network - Storage1
# ─────────────────────────────────────────────────────────────────────────────
- name: Configure network on storage1
  hosts: storage1
  become: true

  tasks:
    - name: Configure netplan for storage1
      copy:
        dest: /etc/netplan/50-cloud-init.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            ethernets:
              ens33:
                addresses:
                  - 192.168.182.197/24
                routes:
                  - to: default
                    via: 192.168.182.2
                nameservers:
                  addresses: [8.8.8.8]
              ens37:
                addresses:
                  - 192.168.225.197/24
      tags: network

    - name: Apply netplan
      command: netplan apply
      tags: network

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 7: Cấu hình network - Object nodes
# ─────────────────────────────────────────────────────────────────────────────
- name: Configure network on object nodes
  hosts: object_nodes
  become: true

  vars:
    object_ips:
      object1: "192.168.182.198"
      object2: "192.168.182.199"
    object_mgmt_ips:
      object1: "192.168.225.198"
      object2: "192.168.225.199"

  tasks:
    - name: Configure netplan for object nodes
      copy:
        dest: /etc/netplan/50-cloud-init.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            ethernets:
              ens33:
                addresses:
                  - {{ object_ips[inventory_hostname] }}/24
                routes:
                  - to: default
                    via: 192.168.182.2
                nameservers:
                  addresses: [8.8.8.8]
              ens37:
                addresses:
                  - {{ object_mgmt_ips[inventory_hostname] }}/24
      tags: network

    - name: Apply netplan
      command: netplan apply
      tags: network

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 8: Flush IP trên ens33 (neutron_external_interface)
# Chạy TRƯỚC khi kolla-ansible prechecks
# ─────────────────────────────────────────────────────────────────────────────
- name: Flush IP on neutron_external_interface (ens33)
  hosts: core_nodes
  become: true

  tasks:
    - name: Flush IP address on ens33
      shell: ip addr flush dev ens33 && ip link set ens33 up
      changed_when: true
      tags: flush-ens33

    - name: Verify ens33 has no IP
      shell: ip addr show ens33 | grep 'inet ' || echo "no IP - OK"
      register: ens33_check
      changed_when: false
      tags: flush-ens33

    - name: Show ens33 status
      debug:
        msg: "{{ inventory_hostname }} ens33: {{ ens33_check.stdout }}"
      tags: flush-ens33

# ─────────────────────────────────────────────────────────────────────────────
# PLAY 9: Verify - Kiểm tra tất cả nodes sẵn sàng
# ─────────────────────────────────────────────────────────────────────────────
- name: Verify all nodes are ready
  hosts: all_nodes
  become: true

  tasks:
    - name: Check Docker is running
      systemd:
        name: docker
      register: docker_status
      tags: verify

    - name: Check chrony is running
      systemd:
        name: chrony
      register: chrony_status
      tags: verify

    - name: Print node status
      debug:
        msg: |
          Node: {{ inventory_hostname }}
          Docker: {{ docker_status.status.ActiveState }}
          Chrony: {{ chrony_status.status.ActiveState }}
      tags: verify
